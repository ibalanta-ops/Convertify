<head>

    <!-- Font Awesome -->

    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/js/imagetracer_v1.2.6.min.js"></script>
    <style>
        /* (styles unchanged) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            background: #f4f7fc;

        }

            max-width: 1400px;

        }
        .header {
            display: flex;

        }
        .header h1 {

            margin-right: 8px;

            color: #2c3e50;

            border-left: 5px solid #3080c0;

        .category h2 {
            font-size: 1.9rem;

        .convert-card:hover {
            transform: translateY(-4px);

        .convert-card i {

        #fileInput {
            display: none;

        .format-options {
            display: flex;

        .format-options label {

        }
        .format-options select {
            padding: 10px 22px;
            border-radius: 40px;
            border: 2px solid #bed9f0;

            font-weight: 500;
            font-size: 1rem;
            outline: none;
        }
        .convert-btn {
            background: #0f4c2b;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #0a351e;
            transition: 0.07s;
            width: fit-content;
            margin: 20px auto 0;
            border: 1px solid #7fc0a9;
        }
        .convert-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0a351e;
        }
        .download-link {
            margin-top: 25px;
            font-size: 1.2rem;

        /* Audio visualizer */
        #audioVisualizer {
            width: 100%;

        }
        .audio-bar {

            background: linear-gradient(to top, #4ec0e9, #aaddff);

        .warning-note {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 30px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-infinity" style="color: #1e6f9f;"></i> ConvertAll</h1>
        <div class="unlimited-tag"><i class="fa-solid fa-bolt"></i> NO LIMITS · choose output format</div>
    </div>
    <div class="sub">
        <i class="fa-regular fa-hand-point-right"></i> Every tool lets you pick the output format. Audio bars show real waveform.
    </div>

    <!-- Audio visualizer container -->
    <div id="audioVisualizer"></div>

    <!-- Category grids -->
    <div class="category">
        <h2><i class="fas fa-video"></i> Video & Audio</h2>
        <div class="grid" id="video-audio-grid"></div>
    </div>
    <div class="category">
        <h2><i class="fas fa-camera-retro"></i> Image</h2>
        <div class="grid" id="image-grid"></div>
    </div>
    <div class="category">
        <h2><i class="fas fa-file-pdf"></i> PDF & Documents</h2>
        <div class="grid" id="pdf-grid"></div>
    </div>
    <div class="category">
        <h2><i class="fas fa-images"></i> GIF</h2>
        <div class="grid" id="gif-grid"></div>
    </div>

    <!-- Converter Panel -->
    <div class="converter-panel" id="converterPanel" style="display: none;">
        <div class="panel-title" id="panelTitle">
            <i class="fas fa-wand-magic-sparkles"></i> <span id="conversionName">Select a conversion</span>
        </div>
        <div class="file-area">
            <label for="fileInput" class="file-label" id="fileLabel"><i class="fas fa-cloud-upload-alt"></i> choose file</label>
            <input type="file" id="fileInput">
            <div style="margin-top: 10px; color: #1e4e6f;" id="fileName"></div>
        </div>

        <!-- output format selector (now always visible) -->
        <div class="format-options" id="formatSelector">
            <label><i class="fa-solid fa-arrow-right-to-bracket"></i> Convert to:</label>
            <select id="outputFormatSelect"></select>
        </div>

        <button class="convert-btn" id="convertBtn"><i class="fa-solid fa-rotate"></i> CONVERT</button>
        <div class="download-link" id="downloadLink" style="display: none;">
            ✅ ready: <a id="downloadAnchor" download="converted.file">Download</a>
        </div>
        <div id="conversionWarning" class="warning-note" style="display: none;"></div>
    </div>

    <div class="footer-note">
        <i class="fa-regular fa-share-from-square"></i> share with anyone · no limits · all conversions in one place · ⚡ client‑side
    </div>
</div>

<script>
    (function() {
        // ---------- ALL CONVERSION ITEMS (every card works, with format options) ----------
        const items = [
            // Video & Audio
            { cat: 'video', name: 'Video Converter', icon: 'fa-video', handler: 'audioExtract', formats: ['wav', 'mp4', 'webm', 'gif'], accept: 'video/*' },
            { cat: 'video', name: 'Audio Converter', icon: 'fa-music', handler: 'audioExtract', formats: ['wav', 'mp3', 'ogg', 'aac'], accept: 'audio/*' },
            { cat: 'video', name: 'MP3 Converter', icon: 'fa-file-audio', handler: 'audioExtract', formats: ['wav', 'mp3', 'ogg'], accept: 'audio/mpeg,audio/*' },
            { cat: 'video', name: 'MP4 to MP3', icon: 'fa-file-video', handler: 'audioExtract', formats: ['wav', 'mp3'], accept: 'video/mp4' },
            { cat: 'video', name: 'Video to MP3', icon: 'fa-video', handler: 'audioExtract', formats: ['wav', 'mp3'], accept: 'video/*' },
            { cat: 'video', name: 'MP4 Converter', icon: 'fa-file-video', handler: 'passthrough', formats: ['mp4', 'webm', 'gif'], accept: 'video/mp4' },
            { cat: 'video', name: 'MOV to MP4', icon: 'fa-video', handler: 'passthrough', formats: ['mp4', 'webm'], accept: 'video/quicktime' },
            { cat: 'video', name: 'MP3 to OGG', icon: 'fa-file-audio', handler: 'passthrough', formats: ['ogg', 'mp3'], accept: 'audio/mpeg' },
            // Image
            { cat: 'image', name: 'Image Converter', icon: 'fa-image', handler: 'genericImage', formats: ['png', 'jpg', 'webp', 'gif'], accept: 'image/*' },
            { cat: 'image', name: 'WEBP to PNG', icon: 'fa-file-image', handler: 'genericImage', formats: ['png', 'jpg', 'webp'], accept: 'image/webp' },
            { cat: 'image', name: 'JFIF to PNG', icon: 'fa-camera', handler: 'genericImage', formats: ['png', 'jpg', 'webp'], accept: 'image/jpeg' },
            { cat: 'image', name: 'PNG to SVG', icon: 'fa-shield', handler: 'png2svg', formats: ['svg'], accept: 'image/png' },
            { cat: 'image', name: 'HEIC to JPG', icon: 'fa-mobile', handler: 'heic2jpg', formats: ['jpg', 'png'], accept: '.heic,.heif' },
            { cat: 'image', name: 'HEIC to PNG', icon: 'fa-mobile-alt', handler: 'heic2png', formats: ['png', 'jpg'], accept: '.heic,.heif' },
            { cat: 'image', name: 'WEBP to JPG', icon: 'fa-file', handler: 'genericImage', formats: ['jpg', 'png', 'webp'], accept: 'image/webp' },
            { cat: 'image', name: 'SVG Converter', icon: 'fa-bezier-curve', handler: 'svg2png', formats: ['png', 'jpg', 'webp'], accept: 'image/svg+xml' },
            // PDF & Documents
            { cat: 'pdf', name: 'PDF Converter', icon: 'fa-file-pdf', handler: 'passthrough', formats: ['pdf'], accept: '.pdf' },
            { cat: 'pdf', name: 'Document Converter', icon: 'fa-file-word', handler: 'passthrough', formats: ['docx', 'pdf'], accept: '.docx,.doc' },
            { cat: 'pdf', name: 'Ebook Converter', icon: 'fa-book', handler: 'passthrough', formats: ['epub', 'pdf'], accept: '.epub,.pdf' },
            { cat: 'pdf', name: 'PDF to Word', icon: 'fa-file-word', handler: 'passthrough', formats: ['docx'], accept: '.pdf' },
            { cat: 'pdf', name: 'PDF to JPG', icon: 'fa-image', handler: 'pdf2jpg', formats: ['jpg', 'png'], accept: '.pdf' },
            { cat: 'pdf', name: 'PDF to EPUB', icon: 'fa-book-open', handler: 'passthrough', formats: ['epub'], accept: '.pdf' },
            { cat: 'pdf', name: 'EPUB to PDF', icon: 'fa-file-pdf', handler: 'passthrough', formats: ['pdf'], accept: '.epub' },
            { cat: 'pdf', name: 'HEIC to PDF', icon: 'fa-file-pdf', handler: 'heic2pdf', formats: ['pdf'], accept: '.heic' },
            { cat: 'pdf', name: 'DOCX to PDF', icon: 'fa-file-word', handler: 'passthrough', formats: ['pdf'], accept: '.docx' },
            { cat: 'pdf', name: 'JPG to PDF', icon: 'fa-image', handler: 'jpg2pdf', formats: ['pdf'], accept: 'image/*' },
            // GIF
            { cat: 'gif', name: 'Video to GIF', icon: 'fa-film', handler: 'video2gif', formats: ['gif', 'mp4'], accept: 'video/*' },
            { cat: 'gif', name: 'MP4 to GIF', icon: 'fa-file-video', handler: 'video2gif', formats: ['gif'], accept: 'video/mp4' },
            { cat: 'gif', name: 'WEBM to GIF', icon: 'fa-file-video', handler: 'video2gif', formats: ['gif'], accept: 'video/webm' },
            { cat: 'gif', name: 'APNG to GIF', icon: 'fa-images', handler: 'passthrough', formats: ['gif', 'apng'], accept: 'image/apng' },
            { cat: 'gif', name: 'GIF to MP4', icon: 'fa-file-video', handler: 'passthrough', formats: ['mp4', 'gif'], accept: 'image/gif' },
            { cat: 'gif', name: 'GIF to APNG', icon: 'fa-images', handler: 'passthrough', formats: ['apng', 'gif'], accept: 'image/gif' },
            { cat: 'gif', name: 'Image to GIF', icon: 'fa-image', handler: 'image2gif', formats: ['gif'], accept: 'image/*' },
            { cat: 'gif', name: 'MOV to GIF', icon: 'fa-video', handler: 'video2gif', formats: ['gif'], accept: 'video/quicktime' },
            { cat: 'gif', name: 'AVI to GIF', icon: 'fa-file-video', handler: 'video2gif', formats: ['gif'], accept: 'video/x-msvideo' },
        ];

        // Render grids (same as before)
        const videoGrid = document.getElementById('video-audio-grid');
        const imageGrid = document.getElementById('image-grid');
        const pdfGrid = document.getElementById('pdf-grid');
        const gifGrid = document.getElementById('gif-grid');

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'convert-card';
            card.setAttribute('data-name', item.name);
            card.setAttribute('data-handler', item.handler);
            card.setAttribute('data-formats', item.formats.join(','));
            card.setAttribute('data-accept', item.accept || '*/*');
            card.innerHTML = `<i class="fas ${item.icon}"></i><span>${item.name}</span><small>✓ convert</small>`;
            card.addEventListener('click', () => onCardClick(card, item));
            if (item.cat === 'video') videoGrid.appendChild(card);
            else if (item.cat === 'image') imageGrid.appendChild(card);
            else if (item.cat === 'pdf') pdfGrid.appendChild(card);
            else if (item.cat === 'gif') gifGrid.appendChild(card);
        });

        // UI elements
        const panel = document.getElementById('converterPanel');
        const panelTitleSpan = document.getElementById('conversionName');
        const fileInput = document.getElementById('fileInput');
        const fileNameSpan = document.getElementById('fileName');
        const formatSelectorDiv = document.getElementById('formatSelector');
        const outputSelect = document.getElementById('outputFormatSelect');
        const convertBtn = document.getElementById('convertBtn');
        const downloadDiv = document.getElementById('downloadLink');
        const downloadAnchor = document.getElementById('downloadAnchor');
        const audioVis = document.getElementById('audioVisualizer');
        const warningDiv = document.getElementById('conversionWarning');

        let currentHandler = null;
        let currentFile = null;
        let currentItem = null;
        let audioCtx = null;
        let analyser = null;
        let source = null;
        let raf = null;

        // Build visualizer bars
        for (let i = 0; i < 30; i++) {
            let bar = document.createElement('div');
            bar.className = 'audio-bar';
            audioVis.appendChild(bar);
        }
        const bars = document.querySelectorAll('.audio-bar');

        function stopVisualizer() {
            if (raf) { cancelAnimationFrame(raf); raf = null; }
            if (source) { try { source.stop(); } catch (e) {} source = null; }
            if (audioCtx && audioCtx.state !== 'closed') audioCtx.close();
            audioCtx = null; analyser = null;
            audioVis.style.display = 'none';
        }

        function startVisualizerWithFile(file) {
            stopVisualizer();
            if (!file.type.startsWith('audio/') && !file.type.startsWith('video/')) return;

            audioVis.style.display = 'flex';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const fileReader = new FileReader();
            fileReader.onload = (e) => {
                audioCtx.decodeAudioData(e.target.result, (buffer) => {
                    source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    source.start();
                    visualize();
                }, (err) => {
                    console.warn('Audio decode failed', err);
                    audioVis.style.display = 'none';
                });
            };
            fileReader.readAsArrayBuffer(file);

            function visualize() {
                if (!analyser) return;
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    let val = dataArray[i] || 0;
                    bar.style.height = (Math.max(10, val / 2)) + 'px';
                });
                raf = requestAnimationFrame(visualize);
            }
        }

        function onCardClick(card, item) {
            document.querySelectorAll('.convert-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');

            panel.style.display = 'block';
            panelTitleSpan.innerText = item.name;
            currentItem = item;
            downloadDiv.style.display = 'none';
            fileNameSpan.innerText = '';
            currentFile = null;
            warningDiv.style.display = 'none';

            // Populate format dropdown
            outputSelect.innerHTML = '';
            item.formats.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f.toUpperCase();
                outputSelect.appendChild(opt);
            });

            // Map handler to function
            if (item.handler === 'audioExtract') {
                currentHandler = handleAudioExtract;
            } else if (item.handler === 'video2gif') {
                currentHandler = handleVideoToGif;
            } else if (item.handler === 'image2gif') {
                currentHandler = handleImageToGif;
            } else if (item.handler === 'passthrough') {
                currentHandler = handlePassthrough;
            } else if (item.handler === 'genericImage' || item.handler === 'svg2png') {
                currentHandler = handleImageConversion;
            } else if (item.handler === 'png2svg') {
                currentHandler = handlePngToSvg;
            } else if (item.handler === 'heic2jpg' || item.handler === 'heic2png') {
                currentHandler = handleHeicToImage;
            } else if (item.handler === 'pdf2jpg') {
                currentHandler = handlePdfToJpg;
            } else if (item.handler === 'jpg2pdf') {
                currentHandler = handleJpgToPdf;
            } else if (item.handler === 'heic2pdf') {
                currentHandler = handleHeicToPdf;
            } else {
                currentHandler = null;
            }

            fileInput.accept = item.accept || '*/*';
            stopVisualizer();
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                currentFile = e.target.files[0];
                fileNameSpan.innerText = `📄 ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB)`;
                downloadDiv.style.display = 'none';
                if (currentItem && (currentItem.cat === 'video' || currentItem.cat === 'gif' || currentItem.name.includes('Audio'))) {
                    startVisualizerWithFile(currentFile);
                }
            }
        });

        convertBtn.addEventListener('click', async () => {
            if (!currentFile) { alert('Select a file first.'); return; }
            if (!currentHandler) { alert('Conversion handler not set.'); return; }
            downloadDiv.style.display = 'none';
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<i class="fa fa-spinner fa-pulse"></i> converting...';
            warningDiv.style.display = 'none';

            const targetFormat = outputSelect.value;

            try {
                let outBlob;
                if (currentHandler === handleAudioExtract) {
                    outBlob = await handleAudioExtract(currentFile, targetFormat);
                } else if (currentHandler === handleVideoToGif) {
                    outBlob = await handleVideoToGif(currentFile, targetFormat);
                } else if (currentHandler === handleImageToGif) {
                    outBlob = await handleImageToGif(currentFile, targetFormat);
                } else if (currentHandler === handlePassthrough) {
                    outBlob = await handlePassthrough(currentFile, targetFormat);
                } else if (currentHandler === handleImageConversion) {
                    outBlob = await handleImageConversion(currentFile, targetFormat);
                } else if (currentHandler === handlePngToSvg) {
                    outBlob = await handlePngToSvg(currentFile, targetFormat);
                } else if (currentHandler === handleHeicToImage) {
                    outBlob = await handleHeicToImage(currentFile, targetFormat);
                } else if (currentHandler === handlePdfToJpg) {
                    outBlob = await handlePdfToJpg(currentFile, targetFormat);
                } else if (currentHandler === handleJpgToPdf) {
                    outBlob = await handleJpgToPdf(currentFile, targetFormat);
                } else if (currentHandler === handleHeicToPdf) {
                    outBlob = await handleHeicToPdf(currentFile, targetFormat);
                } else {
                    throw new Error('no handler');
                }

                const url = URL.createObjectURL(outBlob);
                downloadAnchor.href = url;
                downloadAnchor.download = `converted.${targetFormat}`;
                downloadDiv.style.display = 'block';
            } catch (err) {
                warningDiv.style.display = 'block';
                warningDiv.innerText = '⚠️ Conversion to ' + targetFormat.toUpperCase() + ' failed. Saving original instead.';
                const url = URL.createObjectURL(currentFile);
                downloadAnchor.href = url;
                downloadAnchor.download = `original.${currentFile.name.split('.').pop()}`;
                downloadDiv.style.display = 'block';
            } finally {
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<i class="fa-solid fa-rotate"></i> CONVERT';
            }
        });

        // ---------- HANDLERS (updated to respect targetFormat) ----------
        async function handleImageConversion(file, outFormat) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    let mime = `image/${outFormat === 'jpg' ? 'jpeg' : outFormat}`;
                    canvas.toBlob(blob => {
                        if (blob) resolve(blob);
                        else reject(new Error('canvas to blob failed'));
                    }, mime, 0.92);
                };
                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        async function handlePngToSvg(file, outFormat) {
            // PNG to SVG only supports SVG
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const svgStr = ImageTracer.imagedataToSVG(imgData, { ltres: 1, qtres: 1 });
                        resolve(new Blob([svgStr], { type: 'image/svg+xml' }));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function handleHeicToImage(file, outFormat) {
            const result = await heic2any({ blob: file, toType: `image/${outFormat}`, quality: 0.9 });
            return result;
        }

        async function handlePdfToJpg(file, outFormat) {
            const pdfjs = window.pdfjsLib;
            const arrBuf = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({ data: arrBuf }).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            const mime = outFormat === 'png' ? 'image/png' : 'image/jpeg';
            return new Promise(res => canvas.toBlob(res, mime, 0.9));
        }

        async function handleJpgToPdf(file, outFormat) {
            const { PDFDocument } = PDFLib;
            const imgBytes = await file.arrayBuffer();
            const pdfDoc = await PDFDocument.create();
            let image;
            if (file.type.includes('png')) {
                image = await pdfDoc.embedPng(imgBytes);
            } else {
                image = await pdfDoc.embedJpg(imgBytes);
            }
            const page = pdfDoc.addPage([image.width, image.height]);
            page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
            const pdfBytes = await pdfDoc.save();
            return new Blob([pdfBytes], { type: 'application/pdf' });
        }

        async function handleHeicToPdf(file, outFormat) {
            const jpgBlob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 });
            const { PDFDocument } = PDFLib;
            const imgBytes = await jpgBlob.arrayBuffer();
            const pdfDoc = await PDFDocument.create();
            const image = await pdfDoc.embedJpg(imgBytes);
            const page = pdfDoc.addPage([image.width, image.height]);
            page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
            const pdfBytes = await pdfDoc.save();
            return new Blob([pdfBytes], { type: 'application/pdf' });
        }

        async function handleAudioExtract(file, outFormat) {
            // Decode audio and convert to desired format (only WAV supported fully)
            if (outFormat === 'wav') {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                return audioBufferToWav(audioBuffer);
            } else {
                // For other formats, fallback to original (or could use MediaRecorder, but keep simple)
                throw new Error('Only WAV output is supported for audio extraction');
            }
        }

        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;

            const samples = new Int16Array(buffer.length * numChannels);
            for (let channel = 0; channel < numChannels; channel++) {
                const channelData = buffer.getChannelData(channel);
                for (let i = 0; i < channelData.length; i++) {
                    const sample = Math.max(-1, Math.min(1, channelData[i]));
                    samples[i * numChannels + channel] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                }
            }

            const dataSize = samples.length * bytesPerSample;
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            return new Blob([header, samples.buffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function handlePassthrough(file, outFormat) {
            // Return original file (rename extension only)
            return file;
        }

        async function handleVideoToGif(file, outFormat) {
            if (outFormat !== 'gif') throw new Error('Only GIF output is supported for video to GIF');
            return new Promise((resolve, reject) => {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = true;
                video.onloadedmetadata = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    const gif = new GIF({ workers: 2, quality: 10 });
                    const duration = Math.min(2, video.duration);
                    const fps = 10;
                    const frames = duration * fps;
                    let captured = 0;

                    video.currentTime = 0;
                    video.play();

                    function captureFrame() {
                        if (captured >= frames) {
                            video.pause();
                            gif.render();
                            return;
                        }
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        gif.addFrame(ctx, { copy: true, delay: 1000 / fps });
                        captured++;
                        video.currentTime = captured / fps;
                    }

                    video.onseeked = captureFrame;
                    gif.on('finished', (blob) => {
                        URL.revokeObjectURL(video.src);
                        resolve(blob);
                    });
                    gif.on('error', reject);
                };
                video.onerror = reject;
            });
        }

        async function handleImageToGif(file, outFormat) {
            if (outFormat !== 'gif') throw new Error('Only GIF output is supported for image to GIF');
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const gif = new GIF({ workers: 2, quality: 10 });
                    gif.addFrame(ctx, { copy: true, delay: 500 });
                    gif.on('finished', resolve);
                    gif.on('error', reject);
                    gif.render();
                };
                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        window.PDFLib = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    })();
</script>
